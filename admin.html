<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Glass Co.</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 30px;
      color: #fff;
      font-size: 32px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-number {
      font-size: 32px;
      font-weight: bold;
      color: #8ecfff;
      margin-bottom: 8px;
    }

    .stat-label {
      color: #999;
      font-size: 14px;
    }

    .table-container {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #252525;
      padding: 15px;
      text-align: left;
      font-weight: 600;
      color: #8ecfff;
      border-bottom: 2px solid #333;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid #333;
    }

    tr:hover {
      background: #222;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }

    .empty-state p {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .error {
      background: #3a1a1a;
      border: 1px solid #cc4444;
      color: #ff6666;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .success {
      background: #1a3a1a;
      border: 1px solid #44cc44;
      color: #66ff66;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: #8ecfff;
      color: #0f0f0f;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      margin-bottom: 20px;
    }

    .btn:hover {
      background: #c084fc;
    }

    .message-preview {
      max-width: 300px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .date {
      color: #666;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 24px;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 Contact Submissions</h1>

    <div id="message"></div>

    <button class="btn" onclick="refreshData()">🔄 Refresh</button>

    <div class="stats" id="stats"></div>

    <div class="table-container">
      <div id="loading" class="loading">Loading contacts...</div>
      <table id="contactsTable" style="display: none;">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Company</th>
            <th>Service</th>
            <th>Budget</th>
            <th>Message</th>
            <th>Submitted</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="empty" class="empty-state" style="display: none;">
        <p>No contact submissions yet.</p>
      </div>
    </div>
  </div>

  <script>
    async function loadContacts() {
      try {
        const apiUrl = window.location.origin + '/api/contacts';
        console.log('Fetching from:', apiUrl);
        
        const response = await fetch(apiUrl);
        console.log('Response status:', response.status);
        
        if (!response.ok) {
          throw new Error(`API error: ${response.status} ${response.statusText}`);
        }
        
        const contacts = await response.json();
        console.log('Contacts loaded:', contacts.length);

        const loading = document.getElementById('loading');
        const table = document.getElementById('contactsTable');
        const empty = document.getElementById('empty');
        const tbody = document.getElementById('tbody');
        const stats = document.getElementById('stats');

        if (!contacts || contacts.length === 0) {
          loading.style.display = 'none';
          empty.style.display = 'block';
          table.style.display = 'none';
          stats.innerHTML = `
            <div class="stat-card">
              <div class="stat-number">0</div>
              <div class="stat-label">Total Submissions</div>
            </div>
          `;
          return;
        }

        // Build stats
        stats.innerHTML = `
          <div class="stat-card">
            <div class="stat-number">${contacts.length}</div>
            <div class="stat-label">Total Submissions</div>
          </div>
          <div class="stat-card">
            <div class="stat-number">${new Set(contacts.map(c => c.email)).size}</div>
            <div class="stat-label">Unique Emails</div>
          </div>
          <div class="stat-card">
            <div class="stat-number">${new Set(contacts.map(c => c.company)).size}</div>
            <div class="stat-label">Companies</div>
          </div>
        `;

        // Build table
        tbody.innerHTML = '';
        contacts.forEach(contact => {
          const date = new Date(contact.created_at).toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });

          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${contact.id}</td>
            <td>${contact.first_name} ${contact.last_name}</td>
            <td>${contact.email}</td>
            <td>${contact.company || '—'}</td>
            <td>${contact.service || '—'}</td>
            <td>${contact.budget || '—'}</td>
            <td><div class="message-preview" title="${contact.message}">${contact.message}</div></td>
            <td><span class="date">${date}</span></td>
          `;
          tbody.appendChild(row);
        });

        loading.style.display = 'none';
        empty.style.display = 'none';
        table.style.display = 'table';
      } catch (error) {
        console.error('Error details:', error);
        const msg = document.getElementById('message');
        msg.innerHTML = `<div class="error">Error loading contacts: ${error.message}<br><small>Check browser console (F12) for details</small></div>`;
        document.getElementById('loading').style.display = 'none';
      }
    }

    function refreshData() {
      loadContacts();
      const msg = document.getElementById('message');
      msg.innerHTML = '<div class="success">✓ Data refreshed!</div>';
      setTimeout(() => msg.innerHTML = '', 3000);
    }

    loadContacts();
  </script>
</body>
</html>
